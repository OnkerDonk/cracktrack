<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#0a0a0f"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-title" content="CrackTrack"/>
  <title>CrackTrack</title>
  <link rel="manifest" href="manifest.json"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:    #0a0a0f;
      --bg2:   #0f0f18;
      --bg3:   #14141f;
      --border:#1e1e30;
      --accent:#00ff88;
      --red:   #ff3366;
      --blue:  #00aaff;
      --purple:#aa44ff;
      --text:  #e0e0f0;
      --muted: #6060a0;
      --dim:   #303050;
      --safe-top: env(safe-area-inset-top);
      --safe-bottom: env(safe-area-inset-bottom);
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif}
    #app{display:flex;flex-direction:column;height:100%}

    /* ── AD BANNER ── */
    .ad{background:#0d0d1a;border-bottom:1px solid var(--border);padding:6px 16px;
        padding-top:calc(6px + var(--safe-top));display:flex;align-items:center;
        gap:10px;min-height:42px;flex-shrink:0}
    .ad-badge{font-size:8px;letter-spacing:2px;color:#303050;border:1px solid #202035;
              padding:2px 5px;border-radius:2px;flex-shrink:0}
    .ad-text{font-size:11px;color:#404065;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .ad-cta{font-size:10px;color:#4060a0;border:1px solid #203050;padding:3px 10px;
            border-radius:3px;white-space:nowrap;cursor:pointer;flex-shrink:0}

    /* ── HEADER ── */
    .header{background:var(--bg2);border-bottom:1px solid var(--border);
            padding:0 16px;height:50px;display:flex;align-items:center;
            gap:14px;flex-shrink:0}
    .logo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;
          color:var(--accent);text-shadow:0 0 15px rgba(0,255,136,.3);flex-shrink:0}
    .logo span{color:var(--red)}
    .sync-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);
              flex-shrink:0;animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
    .header-right{margin-left:auto;font-size:10px;color:var(--muted);
                  font-family:'Share Tech Mono',monospace;letter-spacing:1px}

    /* ── STATS ROW ── */
    .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;
           padding:12px 16px;flex-shrink:0}
    .stat{background:var(--bg2);border:1px solid var(--border);border-radius:7px;
          padding:10px 12px;position:relative;overflow:hidden}
    .stat::after{content:'';position:absolute;top:0;left:0;right:0;height:2px}
    .stat.g::after{background:var(--accent)} .stat.r::after{background:var(--red)} .stat.p::after{background:var(--purple)}
    .stat-label{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:3px}
    .stat-val{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:2px}
    .stat.g .stat-val{color:var(--accent)} .stat.r .stat-val{color:var(--red)} .stat.p .stat-val{color:var(--purple)}

    /* ── SEARCH + FILTER ── */
    .controls{padding:0 16px 10px;flex-shrink:0;display:flex;flex-direction:column;gap:8px}
    .search-row{display:flex;gap:8px}
    .search-input{flex:1;background:var(--bg2);border:1px solid var(--border);color:var(--text);
                  padding:10px 14px;border-radius:6px;font-family:'Share Tech Mono',monospace;
                  font-size:13px;outline:none}
    .search-input:focus{border-color:var(--blue)}
    .search-input::placeholder{color:var(--muted)}
    .search-btn{background:var(--accent);border:none;color:#000;padding:10px 18px;
                border-radius:6px;font-family:'Bebas Neue',sans-serif;font-size:15px;
                letter-spacing:2px;cursor:pointer;flex-shrink:0}

    .filter-row{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
    .filter-row::-webkit-scrollbar{display:none}
    .ftab{background:var(--bg3);border:1px solid var(--border);color:var(--muted);
          padding:5px 12px;border-radius:4px;font-size:10px;font-weight:600;
          letter-spacing:1px;text-transform:uppercase;cursor:pointer;white-space:nowrap;
          font-family:'Barlow',sans-serif}
    .ftab.active{color:var(--accent);border-color:var(--accent);background:rgba(0,255,136,.05)}
    .ftab.red.active{color:var(--red);border-color:var(--red);background:rgba(255,51,102,.05)}
    .ftab.purple.active{color:var(--purple);border-color:var(--purple);background:rgba(170,68,255,.05)}
    .ftab.blue.active{color:var(--blue);border-color:var(--blue);background:rgba(0,170,255,.05)}

    /* ── SCROLL AREA ── */
    .scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}

    /* ── TABLE ── */
    .table-wrap{padding:0 16px 80px}
    table{width:100%;border-collapse:collapse}
    thead th{position:sticky;top:0;background:var(--bg2);border-bottom:1px solid var(--border);
             padding:8px 10px;font-size:8px;letter-spacing:2px;text-transform:uppercase;
             color:var(--muted);text-align:left;font-weight:600;z-index:10}
    thead th:first-child{width:48px}
    tbody tr{border-bottom:1px solid rgba(30,30,48,.7);transition:background .15s}
    tbody tr:hover{background:rgba(255,255,255,.02)}
    tbody td{padding:10px 10px;vertical-align:middle}

    /* cover cell */
    .td-cover{width:48px;padding-right:0!important}
    .cover{width:38px;height:50px;object-fit:cover;border-radius:3px;background:var(--bg3);display:block}
    .cover-ph{width:38px;height:50px;border-radius:3px;background:var(--bg3);
              display:flex;align-items:center;justify-content:center;font-size:18px}

    /* title cell */
    .td-title{}
    .game-title{font-weight:600;font-size:13px;color:var(--text);line-height:1.3;
                display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .game-title a{color:inherit;text-decoration:none}
    .game-title a:hover{color:var(--accent)}
    .game-genres{font-size:10px;color:var(--muted);margin-top:2px;
                 white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

    /* release cell */
    .td-release{white-space:nowrap;min-width:80px}
    .rel-date{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--text)}
    .rel-badge{display:inline-block;font-size:8px;font-weight:700;letter-spacing:1.5px;
               text-transform:uppercase;padding:2px 7px;border-radius:3px;margin-top:3px}
    .rel-badge.soon{background:rgba(0,170,255,.12);color:var(--blue);border:1px solid rgba(0,170,255,.25)}
    .rel-badge.tba{background:rgba(96,96,160,.12);color:var(--muted);border:1px solid var(--border)}
    .rel-dsr{font-size:9px;color:var(--muted);margin-top:2px;font-family:'Share Tech Mono',monospace}

    /* status cell */
    .td-status{white-space:nowrap;min-width:90px}
    .status-badge{display:inline-flex;align-items:center;gap:4px;padding:4px 9px;
                  border-radius:10px;font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase}
    .status-badge .dot{width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0}
    .sb-cracked{background:rgba(0,255,136,.1);color:var(--accent);border:1px solid rgba(0,255,136,.25)}
    .sb-hypervisor{background:rgba(170,68,255,.1);color:var(--purple);border:1px solid rgba(170,68,255,.25)}
    .sb-uncracked{background:rgba(255,51,102,.1);color:var(--red);border:1px solid rgba(255,51,102,.25)}
    .sb-unreleased{background:rgba(0,170,255,.1);color:var(--blue);border:1px solid rgba(0,170,255,.25)}
    .crack-group{font-size:9px;color:var(--muted);margin-top:3px;font-family:'Share Tech Mono',monospace}
    .crack-link{font-size:9px;color:#ff6600;text-decoration:none;display:inline-block;margin-top:2px}
    .crack-link:hover{text-decoration:underline}

    /* ── LOADING / EMPTY ── */
    .loading{display:flex;align-items:center;justify-content:center;gap:10px;
             padding:40px;color:var(--muted);font-family:'Share Tech Mono',monospace;
             font-size:12px;letter-spacing:2px}
    .spinner{width:18px;height:18px;border:2px solid var(--border);
             border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .empty{text-align:center;padding:50px 20px;color:var(--muted)}
    .empty-icon{font-size:32px;margin-bottom:10px}
    .empty-text{font-size:13px;line-height:1.6}

    /* ── PAGINATION ── */
    .pagination{display:flex;align-items:center;justify-content:center;gap:8px;
                padding:16px;flex-shrink:0}
    .page-btn{background:var(--bg2);border:1px solid var(--border);color:var(--muted);
              padding:7px 14px;border-radius:5px;font-size:12px;cursor:pointer;
              font-family:'Barlow',sans-serif;font-weight:600}
    .page-btn:hover:not(:disabled){border-color:var(--accent);color:var(--accent)}
    .page-btn:disabled{opacity:.3;cursor:not-allowed}
    .page-info{font-size:11px;color:var(--muted);font-family:'Share Tech Mono',monospace}

    /* ── BOTTOM AD ── */
    .ad-bottom{background:#0d0d1a;border-top:1px solid var(--border);
               padding:6px 16px;padding-bottom:calc(6px + var(--safe-bottom));
               display:flex;align-items:center;gap:10px;min-height:40px;flex-shrink:0}

    /* ── OFFLINE ── */
    .offline{background:rgba(255,51,102,.1);border-bottom:1px solid rgba(255,51,102,.2);
             padding:5px 16px;text-align:center;font-size:10px;color:var(--red);
             font-family:'Share Tech Mono',monospace;letter-spacing:1px;display:none}

    /* ── MOBILE ADJUSTMENTS ── */
    @media(max-width:480px){
      .td-title .game-genres{display:none}
      .td-release .rel-dsr{display:none}
      thead th:nth-child(4){display:none} /* hide genres col on mobile */
    }
  </style>
</head>
<body>
<div id="app">

  <!-- TOP AD -->
  <div class="ad">
    <span class="ad-badge">AD</span>
    <span class="ad-text">🎮 NordVPN — Game securely, bypass geo-blocks, reduce ping</span>
    <span class="ad-cta">TRY FREE →</span>
  </div>

  <div class="offline" id="offline">⚠ OFFLINE — SHOWING CACHED DATA</div>

  <!-- HEADER -->
  <div class="header">
    <div class="logo">CRACK<span>TRACK</span></div>
    <div class="sync-dot" id="sync-dot"></div>
    <div class="header-right" id="sync-status">CONNECTING...</div>
  </div>

  <!-- STATS -->
  <div class="stats">
    <div class="stat g"><div class="stat-label">Cracked</div><div class="stat-val" id="s-cracked">—</div></div>
    <div class="stat r"><div class="stat-label">Uncracked</div><div class="stat-val" id="s-uncracked">—</div></div>
    <div class="stat p"><div class="stat-label">HV Bypass</div><div class="stat-val" id="s-hv">—</div></div>
  </div>

  <!-- CONTROLS -->
  <div class="controls">
    <div class="search-row">
      <input class="search-input" id="search-input" placeholder="Search games..." autocomplete="off"/>
      <button class="search-btn" id="search-btn">GO</button>
    </div>
    <div class="filter-row" id="filter-row">
      <div class="ftab active" data-status="">All</div>
      <div class="ftab" data-status="cracked">Cracked</div>
      <div class="ftab purple" data-status="hypervisor">HV Bypass</div>
      <div class="ftab red" data-status="uncracked">Uncracked</div>
      <div class="ftab blue" data-status="unreleased">Unreleased</div>
    </div>
  </div>

  <!-- SCROLL AREA -->
  <div class="scroll" id="scroll">
    <div class="table-wrap">
      <table id="game-table">
        <thead>
          <tr>
            <th></th>
            <th>Game</th>
            <th>Released</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
      <div id="state-msg" class="loading"><div class="spinner"></div>LOADING...</div>
    </div>
  </div>

  <!-- PAGINATION -->
  <div class="pagination" id="pagination" style="display:none">
    <button class="page-btn" id="prev-btn" disabled>← PREV</button>
    <span class="page-info" id="page-info"></span>
    <button class="page-btn" id="next-btn" disabled>NEXT →</button>
  </div>

  <!-- BOTTOM AD -->
  <div class="ad-bottom">
    <span class="ad-badge">AD</span>
    <span class="ad-text">💾 CDKeys — Cheap legit game keys, save up to 80%</span>
    <span class="ad-cta">SHOP →</span>
  </div>

</div><!-- #app -->

<script>
const API = 'https://cracktrack-api.onrender.com';

let currentFilter = '';
let currentQuery  = '';
let currentPage   = 1;
const PER_PAGE    = 50;

// ── UTILS ─────────────────────────────────────────────────────────────────────
function fmtDate(d) {
  if (!d) return null;
  const dt = new Date(d);
  return dt.toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' });
}
function fmtDays(n) {
  if (n == null || n < 0) return null;
  if (n === 0) return 'Same day';
  if (n > 365) return `${Math.floor(n/365)}y ${n%365}d`;
  return `${n}d`;
}
function escHtml(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── RENDER ROW ────────────────────────────────────────────────────────────────
function renderRow(g) {
  const tr = document.createElement('tr');

  // Cover
  const tdCov = document.createElement('td');
  tdCov.className = 'td-cover';
  tdCov.innerHTML = g.cover_url
    ? `<img class="cover" src="${escHtml(g.cover_url)}" alt="" loading="lazy"/>`
    : `<div class="cover-ph">🎮</div>`;
  tr.appendChild(tdCov);

  // Title + genres
  const tdTitle = document.createElement('td');
  tdTitle.className = 'td-title';
  const titleHtml = g.steam_url
    ? `<a href="${escHtml(g.steam_url)}" target="_blank" rel="noopener">${escHtml(g.title)}</a>`
    : escHtml(g.title);
  tdTitle.innerHTML = `<div class="game-title">${titleHtml}</div>${g.genres ? `<div class="game-genres">${escHtml(g.genres)}</div>` : ''}`;
  tr.appendChild(tdTitle);

  // Release date
  const tdRel = document.createElement('td');
  tdRel.className = 'td-release';
  let relHtml = '';
  if (g.release_status === 'tba') {
    relHtml = `<div class="rel-date">—</div><span class="rel-badge tba">TBA</span>`;
  } else if (g.release_status === 'unreleased') {
    relHtml = `<div class="rel-date">${escHtml(fmtDate(g.release_date)||'—')}</div><span class="rel-badge soon">UPCOMING</span>`;
  } else {
    const dsr = g.days_since_release;
    relHtml = `<div class="rel-date">${escHtml(fmtDate(g.release_date)||'—')}</div>`;
    if (dsr != null) relHtml += `<div class="rel-dsr">${dsr < 0 ? 'in ' + Math.abs(dsr) + 'd' : dsr + 'd ago'}</div>`;
  }
  tdRel.innerHTML = relHtml;
  tr.appendChild(tdRel);

  // Crack status
  const tdSt = document.createElement('td');
  tdSt.className = 'td-status';
  let stHtml = '';
  if (g.release_status !== 'released') {
    stHtml = `<span class="status-badge sb-unreleased"><span class="dot"></span>UNRELEASED</span>`;
  } else if (g.crack_status === 'cracked') {
    stHtml = `<span class="status-badge sb-cracked"><span class="dot"></span>CRACKED</span>`;
    if (g.crack_group) stHtml += `<div class="crack-group">${escHtml(g.crack_group)}</div>`;
    if (g.cracked_date) stHtml += `<div class="crack-group">${escHtml(fmtDate(g.cracked_date)||'')}${g.days_to_crack != null ? ' · ' + fmtDays(g.days_to_crack) : ''}</div>`;
    if (g.crack_source_url) stHtml += `<a class="crack-link" href="${escHtml(g.crack_source_url)}" target="_blank" rel="noopener">Reddit ↗</a>`;
  } else if (g.crack_status === 'hypervisor') {
    stHtml = `<span class="status-badge sb-cracked"><span class="dot"></span>CRACKED</span>
              <span class="status-badge sb-hypervisor" style="margin-top:3px;display:inline-flex"><span class="dot"></span>HV BYPASS</span>`;
    if (g.crack_source_url) stHtml += `<a class="crack-link" href="${escHtml(g.crack_source_url)}" target="_blank" rel="noopener">Reddit ↗</a>`;
  } else {
    stHtml = `<span class="status-badge sb-uncracked"><span class="dot"></span>UNCRACKED</span>`;
  }
  tdSt.innerHTML = stHtml;
  tr.appendChild(tdSt);

  return tr;
}

// ── LOAD DATA ─────────────────────────────────────────────────────────────────
async function loadGames() {
  const tbody  = document.getElementById('tbody');
  const msg    = document.getElementById('state-msg');
  const pag    = document.getElementById('pagination');
  tbody.innerHTML = '';
  msg.style.display = 'flex';
  msg.innerHTML     = '<div class="spinner"></div>LOADING...';
  pag.style.display = 'none';

  const params = new URLSearchParams({ page: currentPage, limit: PER_PAGE });
  if (currentFilter) params.set('status', currentFilter);
  if (currentQuery)  params.set('q', currentQuery);

  try {
    const r = await fetch(`${API}/api/games?${params}`);
    if (!r.ok) throw new Error(r.status);
    const data = await r.json();

    msg.style.display = 'none';
    if (!data.games || !data.games.length) {
      msg.style.display = 'block';
      msg.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div><div class="empty-text">No games found${currentQuery ? ` for "${currentQuery}"` : ''}.</div></div>`;
      return;
    }

    const frag = document.createDocumentFragment();
    data.games.forEach(g => frag.appendChild(renderRow(g)));
    tbody.appendChild(frag);

    // Pagination
    if (data.pages > 1) {
      pag.style.display = 'flex';
      document.getElementById('page-info').textContent = `Page ${data.page} of ${data.pages} · ${data.total} games`;
      document.getElementById('prev-btn').disabled = data.page <= 1;
      document.getElementById('next-btn').disabled = data.page >= data.pages;
    }
  } catch (e) {
    msg.style.display = 'block';
    msg.innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-text">Could not load data.<br/>Backend may be waking up — try again in 30 seconds.</div></div>`;
  }
}

async function loadStats() {
  try {
    const r = await fetch(`${API}/api/stats`);
    const d = await r.json();
    document.getElementById('s-cracked').textContent   = d.cracked ?? '—';
    document.getElementById('s-uncracked').textContent = d.uncracked ?? '—';
    document.getElementById('s-hv').textContent        = d.hypervisor ?? '—';
    document.getElementById('sync-status').textContent = 'LIVE';
  } catch {}
}

// ── EVENTS ────────────────────────────────────────────────────────────────────
document.getElementById('search-btn').addEventListener('click', () => {
  currentQuery = document.getElementById('search-input').value.trim();
  currentPage  = 1;
  loadGames();
});
document.getElementById('search-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('search-btn').click();
});

document.getElementById('filter-row').addEventListener('click', e => {
  const tab = e.target.closest('.ftab');
  if (!tab) return;
  document.querySelectorAll('.ftab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  currentFilter = tab.dataset.status;
  currentPage   = 1;
  loadGames();
});

document.getElementById('prev-btn').addEventListener('click', () => { currentPage--; loadGames(); document.getElementById('scroll').scrollTop = 0; });
document.getElementById('next-btn').addEventListener('click', () => { currentPage++; loadGames(); document.getElementById('scroll').scrollTop = 0; });

window.addEventListener('online',  () => { document.getElementById('offline').style.display = 'none'; });
window.addEventListener('offline', () => { document.getElementById('offline').style.display = 'block'; });

// ── INIT ──────────────────────────────────────────────────────────────────────
loadStats();
loadGames();

if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(() => {});
</script>
</body>
</html>
