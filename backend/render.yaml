services:
  - type: web
    name: cracktrack-api
    env: node
    region: oregon
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: IGDB_CLIENT_ID
        sync: false        # you fill this in the Render dashboard
      - key: IGDB_CLIENT_SECRET
        sync: false        # you fill this in the Render dashboard
    disk:
      name: cracktrack-db
      mountPath: /opt/render/project/src
      sizeGB: 1
